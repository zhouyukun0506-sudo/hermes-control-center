<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workbench</title>
  <meta name="description" content="Workbench — your all-in-one productivity workspace." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/misans@4.0/lib/Normal/MiSans-Regular.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/misans@4.0/lib/Normal/MiSans-Medium.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/misans@4.0/lib/Normal/MiSans-Semibold.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/misans@4.0/lib/Normal/MiSans-Bold.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <script>
    // Expose window controls to renderer (Electron only)
    if (window.process && window.process.type === 'renderer') {
      const { ipcRenderer } = require('electron');
      window.electronAPI = {
        close: () => ipcRenderer.send('win-close'),
        minimize: () => ipcRenderer.send('win-minimize'),
        maximize: () => ipcRenderer.send('win-maximize'),
        fullscreen: () => ipcRenderer.send('win-fullscreen'),
      };
    }
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
